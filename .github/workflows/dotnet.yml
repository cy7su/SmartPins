name: Build SmartPins

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_FILE: SmartPins.sln
  PROJECT_FILE: SmartPins/SmartPins.csproj

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: ${{ runner.os }}-nuget-

    - run: dotnet restore ${{ env.SOLUTION_FILE }}
    - run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

  publish:
    needs: build-and-test
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Get version
      id: version
      run: |
        $v = (Select-Xml -Path ${{ env.PROJECT_FILE }} -XPath "//Version").Node.InnerText
        if (-not $v) { $v = "1.0.0" }
        echo "version=$v" >> $env:GITHUB_OUTPUT

    - name: Check if tag exists
      id: tag_check
      run: |
        $v = "${{ steps.version.outputs.version }}"
        $exists = git tag --list "v$v"
        if ($exists) {
          echo "exists=true" >> $env:GITHUB_OUTPUT
        } else {
          echo "exists=false" >> $env:GITHUB_OUTPUT
        }

    - name: Create and push tag
      if: steps.tag_check.outputs.exists == 'false'
      run: |
        $v = "${{ steps.version.outputs.version }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "v$v"
        git push origin "v$v"

    - run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Publish self-contained
      run: |
        dotnet publish ${{ env.PROJECT_FILE }} `
          --configuration Release `
          --output ./publish-selfcontained `
          --self-contained true `
          --runtime win-x64 `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=false `
          -p:DebugType=None `
          -p:DebugSymbols=false `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:EnableCompressionInSingleFile=true

    - name: Publish framework-dependent
      run: |
        dotnet publish ${{ env.PROJECT_FILE }} `
          --configuration Release `
          --output ./publish-framework `
          --self-contained false `
          --runtime win-x64 `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=false `
          -p:DebugType=None `
          -p:DebugSymbols=false

    - name: Publish portable
      run: |
        dotnet publish ${{ env.PROJECT_FILE }} `
          --configuration Release `
          --output ./publish-portable `
          --self-contained false `
          -p:PublishSingleFile=false `
          -p:PublishTrimmed=false `
          -p:DebugType=None `
          -p:DebugSymbols=false

    - name: Zip artifacts
      run: |
        $v = "${{ steps.version.outputs.version }}"
        Compress-Archive -Path ./publish-selfcontained/SmartPins.exe  -DestinationPath "./SmartPins-$v-selfcontained.zip"
        Compress-Archive -Path ./publish-framework/SmartPins.exe      -DestinationPath "./SmartPins-$v-framework.zip"
        Compress-Archive -Path ./publish-portable/*                   -DestinationPath "./SmartPins-$v-portable.zip"

    - uses: actions/upload-artifact@v4
      with:
        name: SmartPins-${{ steps.version.outputs.version }}-selfcontained
        path: ./publish-selfcontained/SmartPins.exe
        retention-days: 30

    - uses: actions/upload-artifact@v4
      with:
        name: SmartPins-${{ steps.version.outputs.version }}-framework
        path: ./publish-framework/SmartPins.exe
        retention-days: 30

    - uses: actions/upload-artifact@v4
      with:
        name: SmartPins-${{ steps.version.outputs.version }}-portable
        path: ./publish-portable/
        retention-days: 30

    - name: Create GitHub Release
      if: steps.tag_check.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        files: |
          ./SmartPins-${{ steps.version.outputs.version }}-selfcontained.zip
          ./SmartPins-${{ steps.version.outputs.version }}-framework.zip
          ./SmartPins-${{ steps.version.outputs.version }}-portable.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


